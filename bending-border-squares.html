<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bending border around wrapped squares</title>
<style>
  :root{
    --pad: 18px;      /* padding between a square and the border */
    --gap: 36px;       /* flex gap between squares — kept at 2 * var(--pad) so rows touch exactly, no seams */
    --radius: 22px;    /* corner rounding of the outline */
    --stroke: #2b2b2b;
    --fill: #fafaf7;
    --sq: #ffffff;
    --sq-border: #d8d5cc;
  }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f0efe9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* the outer wrapper just needs to be as wide as you want the grid to be able to shrink to */
  .demo-wrap{
    width: min(90vw, 640px);
    resize: horizontal; /* drag the bottom-right corner to test — remove this in production */
    overflow: hidden;
    padding: 4px;
    border: 1px dashed #bbb;
  }

  .shape-container{
    position: relative;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;   /* this is what auto-centers an incomplete last row */
    gap: var(--gap);
    padding: calc(var(--pad) + 6px);
  }

  .shape-svg{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .square{
    position: relative;
    z-index: 1;
    width: 100px;
    height: 100px;
    background: var(--sq);
    border: 1px solid var(--sq-border);
    border-radius: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 1.4rem;
    color:#444;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
</style>
</head>
<body>

<div class="demo-wrap">
  <div class="shape-container" id="container">
    <svg class="shape-svg" id="shapeSvg"></svg>
    <div class="square">1</div>
    <div class="square">2</div>
    <div class="square">3</div>
    <div class="square">4</div>
    <div class="square">5</div>
  </div>
</div>

<script>
(function(){
  const container = document.getElementById('container');
  const svg = document.getElementById('shapeSvg');
  const PAD = 18;   // must match --pad
  const RADIUS = 22;

  function roundedPolygonPath(points, r){
    const n = points.length;
    let d = '';
    for(let i = 0; i < n; i++){
      const prev = points[(i - 1 + n) % n];
      const curr = points[i];
      const next = points[(i + 1) % n];

      const v1 = { x: curr.x - prev.x, y: curr.y - prev.y };
      const v2 = { x: next.x - curr.x, y: next.y - curr.y };
      const len1 = Math.hypot(v1.x, v1.y) || 1;
      const len2 = Math.hypot(v2.x, v2.y) || 1;

      // don't let the radius eat more than half of the shortest adjacent edge
      const rr = Math.min(r, len1 / 2, len2 / 2);

      const p1 = { x: curr.x - (v1.x / len1) * rr, y: curr.y - (v1.y / len1) * rr };
      const p2 = { x: curr.x + (v2.x / len2) * rr, y: curr.y + (v2.y / len2) * rr };

      if(i === 0) d += `M ${p1.x} ${p1.y} `;
      else d += `L ${p1.x} ${p1.y} `;
      d += `Q ${curr.x} ${curr.y} ${p2.x} ${p2.y} `;
    }
    return d + 'Z';
  }

  function buildOutline(){
    const squares = Array.from(container.querySelectorAll('.square'));
    const cRect = container.getBoundingClientRect();

    // rect of each square, relative to container, expanded by padding
    const rects = squares.map(sq => {
      const r = sq.getBoundingClientRect();
      return {
        left: r.left - cRect.left - PAD,
        right: r.right - cRect.left + PAD,
        top: r.top - cRect.top - PAD,
        bottom: r.bottom - cRect.top + PAD,
      };
    });

    // group into rows by top position
    const rows = [];
    rects.forEach(r => {
      let row = rows.find(row => Math.abs(row.top - r.top) < 4);
      if(!row){
        row = { top: r.top, bottom: r.bottom, left: r.left, right: r.right };
        rows.push(row);
      } else {
        row.left = Math.min(row.left, r.left);
        row.right = Math.max(row.right, r.right);
        row.bottom = Math.max(row.bottom, r.bottom);
      }
    });
    rows.sort((a, b) => a.top - b.top);

    // force adjoining rows to touch exactly at the shared seam
    for(let i = 0; i < rows.length - 1; i++){
      const seam = (rows[i].bottom + rows[i + 1].top) / 2;
      rows[i].bottom = seam;
      rows[i + 1].top = seam;
    }

    // walk the staircase: right side down, bottom edge, left side up
    const pts = [];
    pts.push({ x: rows[0].right, y: rows[0].top });
    for(let i = 0; i < rows.length; i++){
      pts.push({ x: rows[i].right, y: rows[i].bottom });
      if(i + 1 < rows.length && rows[i + 1].right !== rows[i].right){
        pts.push({ x: rows[i + 1].right, y: rows[i].bottom });
      }
    }
    pts.push({ x: rows[rows.length - 1].left, y: rows[rows.length - 1].bottom });
    for(let i = rows.length - 1; i >= 0; i--){
      pts.push({ x: rows[i].left, y: rows[i].top });
      if(i - 1 >= 0 && rows[i - 1].left !== rows[i].left){
        pts.push({ x: rows[i - 1].left, y: rows[i].top });
      }
    }

    const d = roundedPolygonPath(pts, RADIUS);
    svg.setAttribute('viewBox', `0 0 ${cRect.width} ${cRect.height}`);
    svg.innerHTML = `<path d="${d}" fill="var(--fill)" stroke="var(--stroke)" stroke-width="2" />`;
  }

  const ro = new ResizeObserver(buildOutline);
  ro.observe(container);
  window.addEventListener('load', buildOutline);
  // fonts/images loading can shift layout slightly after first paint
  setTimeout(buildOutline, 50);
})();
</script>

</body>
</html>
